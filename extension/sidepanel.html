<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webfuse Agent</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="header">
    <div class="header-top">
      <span class="title">✨ Webfuse Agent</span>
      <span class="status" id="status">ready</span>
    </div>
    <div class="header-links">
      <a href="https://webfuse.com" target="_blank">Webfuse</a>
      <span class="sep">·</span>
      <a href="https://webmcp-hub.com" target="_blank">WebMCP Hub</a>
      <span class="sep">·</span>
      <a href="https://dev.webfuse.com" target="_blank">Docs</a>
    </div>
  </div>

  <div id="welcome" class="welcome">
    <div class="welcome-title">Web automation, powered by AI</div>
    <p class="welcome-desc">
      This agent can see and control the page you're browsing. It uses
      <a href="https://webfuse.com" target="_blank">Webfuse</a> for structured page access
      and community-contributed tools from the
      <a href="https://webmcp-hub.com" target="_blank">WebMCP Hub</a>.
    </p>
    <div id="site-context" class="site-context"></div>
    <div id="tool-list" class="tool-list"></div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-row">
    <input id="input" type="text" placeholder="Tell the agent what to do…" autofocus />
    <button id="send">Go</button>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
