<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WebMCP Bridge Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
    }
    header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 9px; }
    .logo { font-size: 18px; }
    header h1 { font-size: 13px; font-weight: 600; color: #fff; }
    #page-url {
      font-size: 10px;
      color: #444;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 1px;
    }
    #clear-btn {
      background: none;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #555;
      cursor: pointer;
      font-size: 11px;
      padding: 4px 8px;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    #clear-btn:hover { border-color: #444; color: #888; }
    #messages {
      height: 340px;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
    .msg {
      max-width: 90%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user   { align-self: flex-end; background: #1a56db; color: #fff; border-radius: 12px 12px 2px 12px; }
    .msg.agent  { align-self: flex-start; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 2px 12px 12px 12px; }
    .msg.system { align-self: center; font-size: 10px; color: #444; background: none; border: none; padding: 0; text-align: center; }
    .msg.thinking { align-self: flex-start; color: #555; font-size: 12px; background: none; border: none; padding: 4px 0; }
    .msg.error  { align-self: center; font-size: 11px; color: #e05252; background: #1a0a0a; border: 1px solid #3a1a1a; border-radius: 8px; padding: 6px 10px; }
    .action-pill {
      display: inline-block;
      background: #0d1f0d;
      border: 1px solid #1a3a1a;
      border-radius: 5px;
      color: #4ade80;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      padding: 2px 7px;
    }
    .suggestions {
      display: flex;
      flex-direction: column;
      gap: 5px;
      align-self: stretch;
      margin-top: 4px;
    }
    .suggestion {
      background: #151515;
      border: 1px solid #222;
      border-radius: 8px;
      color: #666;
      cursor: pointer;
      font-size: 11px;
      padding: 6px 10px;
      text-align: left;
      transition: all 0.12s;
    }
    .suggestion:hover { border-color: #333; color: #999; background: #1a1a1a; }
    footer {
      padding: 10px 12px;
      border-top: 1px solid #1e1e1e;
      display: flex;
      gap: 7px;
    }
    footer input {
      flex: 1;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    footer input::placeholder { color: #3a3a3a; }
    footer input:focus { border-color: #1a56db; }
    footer button#send {
      background: #1a56db;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      padding: 8px 14px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    footer button#send:hover { background: #1e40af; }
    footer button#send:disabled { background: #1a2a4a; color: #4a6a9a; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <span class="logo">🌐</span>
      <div>
        <h1>WebMCP Bridge</h1>
        <div id="page-url">Loading page…</div>
      </div>
    </div>
    <button id="clear-btn" title="Clear conversation">Clear</button>
  </header>
  <div id="messages"></div>
  <footer>
    <input id="input" type="text" placeholder="What do you want to do on this page?" autocomplete="off" />
    <button id="send">Go</button>
  </footer>
  <script src="popup.js"></script>
</body>
</html>
