<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WebMCP Bridge Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
    }
    header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header .logo { font-size: 20px; }
    header h1 { font-size: 14px; font-weight: 600; color: #fff; }
    header small { font-size: 11px; color: #666; }
    #messages {
      height: 340px;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .msg {
      max-width: 88%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    .msg.user  { align-self: flex-end; background: #1a56db; color: #fff; border-radius: 12px 12px 2px 12px; }
    .msg.agent { align-self: flex-start; background: #1e1e1e; border: 1px solid #333; border-radius: 12px 12px 12px 2px; }
    .msg.system { align-self: center; font-size: 11px; color: #555; background: none; border: none; padding: 2px 0; }
    .msg.thinking { align-self: flex-start; color: #555; font-style: italic; font-size: 12px; background: none; border: none; }
    footer {
      padding: 10px 12px;
      border-top: 1px solid #222;
      display: flex;
      gap: 8px;
    }
    footer input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
    }
    footer input:focus { border-color: #1a56db; }
    footer button {
      background: #1a56db;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      padding: 8px 14px;
      transition: background 0.15s;
    }
    footer button:hover { background: #1e40af; }
    footer button:disabled { background: #333; cursor: not-allowed; }
    .action-pill {
      display: inline-block;
      background: #1a2a1a;
      border: 1px solid #2a4a2a;
      border-radius: 6px;
      color: #4ade80;
      font-family: monospace;
      font-size: 11px;
      padding: 2px 7px;
      margin: 2px 0;
    }
  </style>
</head>
<body>
  <header>
    <span class="logo">🌐</span>
    <div>
      <h1>WebMCP Bridge</h1>
      <small>AI agent powered by Webfuse + Claude</small>
    </div>
  </header>
  <div id="messages">
    <div class="msg system">Agent ready. Describe what you want to do on this page.</div>
  </div>
  <footer>
    <input id="input" type="text" placeholder="e.g. Find the search box and search for AI agents" autocomplete="off" />
    <button id="send">Send</button>
  </footer>
  <script src="popup.js"></script>
</body>
</html>
